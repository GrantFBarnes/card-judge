{{define "body"}}
<div style="display: grid; grid-auto-flow: column">
    <h2>Card Statistics</h2>
    <div style="text-align: right;">
        <a href="/stats"><button>Statistics Home</button></a>
    </div>
</div>
<table>
    <tbody>
        <tr>
            <td>Deck</td>
            <td>{{.DeckName}}</td>
        </tr>
        <tr>
            <td>Category</td>
            <td>{{.Category}}</td>
        </tr>
        <tr>
            <td>Text</td>
            <td>{{.Text}}</td>
        </tr>
        <tr>
            <td colspan="2">
                <hr />
            </td>
        </tr>
        <tr>
            <td>Plays</td>
            <td>{{.PlayCount}}</td>
        </tr>
        <tr>
            <td>Wins</td>
            <td>{{.WinCount}}</td>
        </tr>
        <tr>
            <td>Discards</td>
            <td>{{.DiscardCount}}</td>
        </tr>
        <tr>
            <td>Skips</td>
            <td>{{.SkipCount}}</td>
        </tr>
    </tbody>
</table>
<br />
<a href="/stats/cards"><button>Select Different Card</button></a>
<div class="bottom-padding"></div>
{{end}}
