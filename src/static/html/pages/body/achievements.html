{{define "body"}}
<h2>Achievements</h2>
<div>
    <label>
        Progress: <progress
            value="{{.Progress}}"
            max="100"
        >{{printf "%.1f" .Progress}}%</progress>
    </label>
    <span>{{printf "%.1f" .Progress}}%</span>
</div>
<br />
<table>
    <thead>
        <tr>
            <th>Category</th>
            <th>Goal</th>
            <th>Achieved</th>
            <th>Rarity</th>
        </tr>
    </thead>
    <tbody>
        {{range .Achievements}}
        <tr>
            <td>{{.Category}}</td>
            <td style="text-align: right;">{{.Goal}}</td>
            <td style="text-align: center;">
                {{if .Achieved}}
                <i class="bi bi-check-square"></i>
                {{else}}
                <i class="bi bi-square"></i>
                {{end}}
            </td>
            <td style="text-align: right;">{{.Rarity}}</td>
        </tr>
        {{end}}
    </tbody>
</table>
{{end}}
