{{define "body"}}
<h2>Achievements</h2>
<div>
    Total Progress: <progress
        {{if .IsDone}}
        class="done"
        {{end}}
        value="{{.Progress}}"
        max="100"
    >{{printf "%.1f" .Progress}}%</progress>
    <span>{{printf "%.1f" .Progress}}%</span>
</div>
<br />
<table>
    <thead>
        <tr>
            <th>Achievement</th>
            <th>Goal</th>
            <th>Achieved</th>
            <th>Progress</th>
        </tr>
    </thead>
    <tbody>
        {{range .Achievements}}
        <tr>
            <td>{{.Name}}</td>
            <td style="text-align: right;">{{.Goal}}</td>
            <td style="text-align: right;">{{.Achieved}}</td>
            <td>
                <progress
                    {{if .IsDone}}
                    class="done"
                    {{end}}
                    value="{{.Progress}}"
                    max="100"
                >{{printf "%.1f" .Progress}}%</progress>
                <span>{{printf "%.1f" .Progress}}%</span>
            </td>
        </tr>
        {{end}}
    </tbody>
</table>
{{end}}
