{{define "body"}}
<h2>Achievements</h2>
<table>
    <thead>
        <tr>
            <th>Achievement</th>
            <th>Achieved</th>
            <th>Rarity</th>
        </tr>
    </thead>
    <tbody>
        {{range .Achievements}}
        <tr>
            <td>{{.Name}}</td>
            <td>
                {{if .Achieved}}
                <i class="bi bi-check-square"></i>
                {{else}}
                <i class="bi bi-square"></i>
                {{end}}
            </td>
            <td style="text-align: right;">{{.Rarity}}</td>
        </tr>
        {{end}}
    </tbody>
</table>
{{end}}
